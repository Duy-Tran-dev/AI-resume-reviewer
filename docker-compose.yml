services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: my_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      # host 5433 -> container 5432, only for optional local inspection
      # (a GUI client, psql). The app talks to the db service internally.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Always the local compose Postgres, never the .env DATABASE_URL
      # (that one points at the real Neon database used outside Docker).
      DATABASE_URL: postgresql://postgres:postgres@db:5432/my_app
      GROQ_API_KEY: ${GROQ_API_KEY}
    ports:
      - "3000:3000"

volumes:
  db-data:
